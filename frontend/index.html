<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gem Pluck</title>
<meta name="description" content="Gem Pluck -- pluck one of six gems on Stacks (Clarity 4)" />
<meta name="talentapp:project_verification" content="REPLACE_WITH_TALENT_VERIFICATION_HASH">
<style>
  :root { color-scheme: dark; }
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #110820; color: #ece6f5;
    max-width: 640px; margin: 0 auto; padding: 32px 20px;
    line-height: 1.5;
  }
  h1 { font-size: 28px; margin-bottom: 8px; color: #c89bff; }
  p.tagline { color: #9b88b7; margin-top: 0; }
  .card {
    background: #1d1132; border: 1px solid #3b245f; border-radius: 8px;
    padding: 24px; margin: 24px 0;
  }
  label { display: block; margin: 12px 0 4px; color: #9b88b7; font-size: 13px; }
  select, input {
    background: #110820; color: #ece6f5; border: 1px solid #4a2f74;
    padding: 8px 10px; border-radius: 4px; font-family: inherit; font-size: 14px;
    width: 100%; box-sizing: border-box;
  }
  button {
    background: #7a3fd6; color: white; border: 0; padding: 12px 24px;
    border-radius: 6px; font-size: 16px; cursor: pointer; font-family: inherit;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #8f53ea; }
  .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
  .addr, .log { font-size: 12px; color: #9b88b7; word-break: break-all; }
  .log { margin-top: 16px; }
  .log code { color: #ece6f5; background: #110820; padding: 2px 6px; border-radius: 3px; }
  a { color: #c89bff; }
</style>
</head>
<body>
  <h1>Gem Pluck</h1>
  <p class="tagline">Six gems. One pluck at a time. Counts live on-chain.</p>

  <div class="card">
    <label for="gem">Gem (1-6)</label>
    <select id="gem">
      <option value="1">1 -- Ruby</option>
      <option value="2">2 -- Sapphire</option>
      <option value="3">3 -- Emerald</option>
      <option value="4">4 -- Topaz</option>
      <option value="5">5 -- Amethyst</option>
      <option value="6">6 -- Onyx</option>
    </select>
    <div class="addr" id="who" style="margin-top:16px;">not connected</div>
  </div>

  <div class="row">
    <button id="connect">Connect Wallet</button>
    <button id="pluck" disabled>Pluck</button>
  </div>

  <div class="log" id="log"></div>

  <p class="addr" style="margin-top:32px;">
    Contract: <a id="contractLink" target="_blank" rel="noopener"></a><br />
    Network: Stacks Mainnet &middot; Clarity 4
  </p>

<script type="module">
  import { showConnect, openContractCall } from "https://esm.sh/@stacks/connect@7.7.1";
  import { uintCV, PostConditionMode } from "https://esm.sh/@stacks/transactions@6.17.0";

  const CONTRACT_ADDRESS = "SP16F6839630K5XX06KE7KVNSNMYBK89912NH6N4C";
  const CONTRACT_NAME    = "gem-pluck";
  const APP_NAME         = "Gem Pluck";

  const $ = (id) => document.getElementById(id);
  $("contractLink").href = `https://explorer.hiro.so/${CONTRACT_ADDRESS}.${CONTRACT_NAME}?chain=mainnet`;
  $("contractLink").textContent = `${CONTRACT_ADDRESS}.${CONTRACT_NAME}`;

  $("connect").onclick = () => {
    showConnect({
      appDetails: { name: APP_NAME, icon: window.location.origin + "/icon.png" },
      onFinish: ({ userSession }) => {
        const ud = userSession.loadUserData();
        $("who").textContent = "you: " + ud.profile.stxAddress.mainnet;
        $("pluck").disabled = false;
      },
    });
  };

  $("pluck").onclick = () => {
    const gem = Number($("gem").value);
    openContractCall({
      contractAddress: CONTRACT_ADDRESS,
      contractName:    CONTRACT_NAME,
      functionName:    "pluck",
      functionArgs:    [uintCV(gem)],
      postConditionMode: PostConditionMode.Allow,
      network: "mainnet",
      appDetails: { name: APP_NAME, icon: window.location.origin + "/icon.png" },
      onFinish: (data) => {
        $("log").innerHTML = `pluck tx: <code>${data.txId}</code> &mdash; <a href="https://explorer.hiro.so/txid/${data.txId}?chain=mainnet" target="_blank">explorer</a>`;
      },
    });
  };
</script>
</body>
</html>
